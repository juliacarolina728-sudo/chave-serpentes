<script>

        ]
    },
    "5": {
        titulo: "Morfologia 5 - Subdivisão de Bothrops",
        opcoes: [
            { texto: "Desenhos em formato de V invertido ou losangos irregulares, possui uma linha escura que passa transversalmente pelo olho", tipo: "resultado", destino: "Bothrops jararaca (Jararaca)", img: "manchas-jararaca.jpg" },
            { texto: "M Manchas escuras bem desenhadas nas laterais, com formato de ferradura, gancho ou desenho que lembra um telefone.Apresenta um desenho claro no topo da cabeça que se assemelha a uma cruz  ", tipo: "resultado", destino: "Bothrops alternatus (Urutu-cruzeiro)", img: "manchas-urutu.jpg" }
        ]
    },
    "6": {
        titulo: "Morfologia 6 - Formato da Pupila",
        opcoes: [
            { texto: "Pupila vertical (olho de gato)", tipo: "passo", destino: "7", img: "hortulanus.jpg" },
            { texto: "Pupila redonda", tipo: "resultado", destino: "Colubrideos", img: "pupila-redonda.jpg" }
        ]
    },
    "7": {
        titulo: "Morfologia 7 - ",
        opcoes: [
            { texto: "Cabeça muito mais larga que o pescoço estreito; presença de fossetas labiais profundas na lateral da boca", tipo: "resultado", destino: "Corallus hortulanus (Suaçubóia)", img: "hortulanus.jpg" },
            { texto: "Cabeça alongada, pouco destacada do pescoço; fossetas labiais ausentes ou muito difíceis de ver a olho nu", tipo: "passo", destino: "9", img: "jiboya.jpg" }

// ==========================================
// MOTOR DE RENDERIZAÇÃO DA CHAVE
// ==========================================
function carregarPasso(idPasso) {
    const dados = bancoChave[idPasso];

    // Atualiza o título do bloco
    document.getElementById("titulo-morfologia").textContent = dados.titulo;

    const containerOpcoes = document.getElementById("container-opcoes");
    const blocoImagens = document.getElementById("bloco-imagens");

    // Limpa os conteúdos do passo anterior
    containerOpcoes.innerHTML = "";
    blocoImagens.innerHTML = "";

    // Reconstrói as opções mantendo estritamente a sua estrutura CSS original
    dados.opcoes.forEach((opcao, index) => {
        const idUnico = `op-${idPasso}-${index}`;

        // Cria a <div class="opcao">
        const divOpcao = document.createElement("div");
        divOpcao.className = "opcao";

        // Cria o <input type="radio"> (Radio impede nativamente seleções duplas)
        const input = document.createElement("input");
        input.type = "radio";
        input.id = idUnico;
        input.name = "escolha-morfologia";

        // Evento ao clicar na bolinha
        input.onchange = () => {
            if (opcao.tipo === "resultado") {
                exibirResultado(opcao.destino);
            } else {
                carregarPasso(opcao.destino);
            }
        };

        // Cria o <label>
        const label = document.createElement("label");
        label.htmlFor = idUnico;
        label.textContent = opcao.texto;

        // Monta a árvore do HTML
        divOpcao.appendChild(input);
        divOpcao.appendChild(label);
        containerOpcoes.appendChild(divOpcao);

        // Adiciona a linha divisória <hr>, exceto na última opção
        if (index < dados.opcoes.length - 1) {
            const hr = document.createElement("hr");
            hr.id = "divisor";
            containerOpcoes.appendChild(hr);
        }

        // Monta e renderiza a imagem correspondente à opção na área lateral
        const img = document.createElement("img");
        img.src = opcao.img;
        img.alt = opcao.texto;
        img.id = `img-${idUnico}`;
        blocoImagens.appendChild(img);
    });
}

function exibirResultado(resultadoFinal) {
    // Mantém o título, mas limpa as opções e imagens para dar espaço ao veredito
    document.getElementById("container-opcoes").innerHTML = "";
    document.getElementById("bloco-imagens").innerHTML = "";
    
    const areaResultado = document.getElementById("area-resultado");
    const textoResultado = document.getElementById("texto-resultado");

    textoResultado.textContent = "Resultado: " + resultadoFinal;
    areaResultado.style.display = "block";
}

function reiniciarChave() {
    // Oculta a área de resultados e recomeça da etapa 1
    document.getElementById("area-resultado").style.display = "none";
    carregarPasso("1");
}

// Inicia o fluxo automaticamente na Morfologia 1 ao carregar a página
window.onload = () => {
    carregarPasso("1");
};
</script>
