<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serpentes-ID SP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='aparencia.css') }}">
</head>
<body>

<div class="container-index">
    <header>
        <div class="banner">
            
        </div>
        <nav>
            <a href="{{ url_for('index') }}">Início</a>
            <a href="{{ url_for('sobre') }}">Sobre</a>
            <a href="{{ url_for('identificacao') }}">Chaves</a>
            <a href="{{ url_for('sugestoes') }}">Sugestões</a>
        </nav>
     
    </header>

    <main class="container-index">
        <p class="titulo-pagina">Envie suas sugestões para melhorar o site!</p>
        
        <!-- CORREÇÃO: Adicionado action apontando para a rota de envio e o método POST -->
        <form action="{{ url_for('enviar_sugestao') }}" method="POST" class="formulario">
            
            <!-- CORREÇÃO: Adicionado name="nome" -->
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome" required><br><br>

            <!-- CORREÇÃO: Adicionado name="email" -->
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <!-- CORREÇÃO: Adicionado name="sugestao" (mude para o termo exato que seu app.py usa) -->
            <label for="mensagem">Sua sugestão:</label><br>
            <textarea id="mensagem" name="sugestao" rows="5" required></textarea><br><br>

            <button type="submit">Enviar Sugestão</button>
        </form>
    </main>
</div> <!-- Fecha container-index -->

</body>
</html>
